<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .container { font-family: Arial, sans-serif; padding: 20px; border: 1px solid #ddd; }
        .otp-box { font-size: 24px; font-weight: bold; color: #2c3e50; padding: 10px; background: #f4f4f4; text-align: center; width: 150px; }
        .footer { font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Password Reset Request</h2>
    <p>Hello,</p>
    <p>You requested to reset your password. Use the code below to proceed. This code is valid for 10 minutes.</p>

    <div class="otp-box" th:text="${token}">000000</div>

    <p>If you did not request this, please ignore this email.</p>
    <div class="footer">
        <p>SwiftRide Rental Team</p>
    </div>
</div>
</body>
</html>
